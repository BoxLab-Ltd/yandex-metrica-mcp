version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 10
      commit-message:
          prefix: chore(deps)
          prefix-development: chore(deps-dev)
      groups:
          dev-dependencies:
              dependency-type: development
              update-types:
                  - minor
                  - patch
          production-dependencies:
              dependency-type: production
              update-types:
                  - minor
                  - patch
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: ci
      groups:
          github-actions:
              update-types:
                  - minor
                  - patch
