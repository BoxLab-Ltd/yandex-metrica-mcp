version: 2
updates:
    - package-ecosystem: bun
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 10
      commit-message:
          prefix: chore(deps)
          prefix-development: chore(deps-dev)
      ignore:
          # typescript-eslint declares `typescript: >=4.8.4 <6.1.0`, and TS 7
          # removes compiler internals it reaches into — `eslint` crashes outright
          # (tsc itself is fine). Remove this once typescript-eslint's peer range
          # covers 7.x; until then a TS 7 bump can only ever land a red CI.
          - dependency-name: typescript
            update-types:
                - version-update:semver-major
      groups:
          dev-dependencies:
              dependency-type: development
              update-types:
                  - minor
                  - patch
          production-dependencies:
              dependency-type: production
              update-types:
                  - minor
                  - patch
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      commit-message:
          prefix: ci
      groups:
          github-actions:
              update-types:
                  - minor
                  - patch
