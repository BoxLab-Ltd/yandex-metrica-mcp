name: Release

# Publishes to npm AND the official MCP registry when a GitHub Release is
# published. Both use OIDC — no secrets: npm via Trusted Publishing (configure
# the trusted publisher once on npmjs.com pointing at this repo + workflow file),
# the MCP registry via `mcp-publisher login github-oidc` (the io.github.BoxLab-Ltd
# namespace is authorized by the repo owner). Install/build run via Bun from the
# committed bun.lock (reproducible, no untrusted lifecycle scripts); publish runs
# via Node/npm and the artifact is plain tsc output, so it stays Node-only. A
# Desktop Extension (.mcpb) is also bundled with Bun and attached to the Release
# as a downloadable asset (contents: write is for that upload).
on:
    release:
        types: [published]

permissions:
    contents: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
            # Everything the registry can reject is checked HERE, before the
            # irreversible npm publish — otherwise npm goes out, the registry
            # step fails, and the release cannot be re-run (npm refuses to
            # republish a version). See the MCP Registry workflow for recovery.
            - name: Verify the release manifests
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PKG="$(node -p "require('./package.json').version")"
                  SRV="$(node -p "require('./server.json').version")"
                  SRVPKG="$(node -p "require('./server.json').packages[0].version")"
                  MFT="$(node -p "require('./manifest.json').version")"
                  for entry in "package.json:$PKG" "server.json:$SRV" "server.json#packages[0]:$SRVPKG" "manifest.json:$MFT"; do
                    name="${entry%%:*}"; ver="${entry#*:}"
                    test "$ver" = "$TAG" || {
                      echo "$name version ($ver) does not match release tag ($TAG)"; exit 1;
                    }
                  done
                  DESC="$(node -p "require('./server.json').description")"
                  test "${#DESC}" -le 100 || {
                    echo "server.json description is ${#DESC} chars; the MCP registry allows at most 100"; exit 1;
                  }
            - run: npm install -g npm@11.18.0
            - run: bun install --frozen-lockfile
            - run: bun run build
            - name: Build and attach the Desktop Extension (.mcpb)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  MCPB="yandex-metrica-mcp-${GITHUB_REF_NAME#v}.mcpb"
                  bash scripts/pack-mcpb.sh "$MCPB"
                  gh release upload "$GITHUB_REF_NAME" "$MCPB" --clobber
            - name: Publish to npm (skip when the version is already there)
              run: |
                  VERSION="$(node -p "require('./package.json').version")"
                  if npm view "yandex-metrica-mcp@${VERSION}" version >/dev/null 2>&1; then
                    echo "yandex-metrica-mcp@${VERSION} is already published — skipping"
                  else
                    npm publish --ignore-scripts
                  fi

            # Publish to the official MCP registry (registry.modelcontextprotocol.io).
            # Runs after npm publish: the registry validates that the npm package
            # already carries the matching mcpName.
            - name: Install mcp-publisher (pinned + checksum-verified)
              env:
                  MCP_PUBLISHER_VERSION: v1.7.9
                  MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
              run: |
                  curl -fsSL -o mcp-publisher.tar.gz \
                    "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
                  echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
                  tar xzf mcp-publisher.tar.gz mcp-publisher
            - name: Authenticate to the MCP registry (GitHub OIDC)
              run: ./mcp-publisher login github-oidc
            - name: Publish to the MCP registry
              run: ./mcp-publisher publish
