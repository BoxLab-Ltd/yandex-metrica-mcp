name: MCP Registry

# Publishes the CURRENT server.json to the official MCP registry, on demand.
#
# The Release workflow already does this after npm publish. This exists for the
# case where npm succeeded but the registry step failed (a bad manifest, a
# registry outage): npm refuses to republish an existing version, so re-running
# Release cannot reach the registry step. Fix server.json, push, and run this.
# Same OIDC auth as Release — no secrets.
on:
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
            - name: Show what will be published
              run: |
                  VERSION="$(node -p "require('./server.json').version")"
                  DESC="$(node -p "require('./server.json').description")"
                  echo "version: $VERSION"
                  echo "description (${#DESC} chars): $DESC"
                  test "${#DESC}" -le 100 || {
                    echo "server.json description is ${#DESC} chars; the MCP registry allows at most 100"; exit 1;
                  }
            - name: Install mcp-publisher (pinned + checksum-verified)
              env:
                  MCP_PUBLISHER_VERSION: v1.7.9
                  MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
              run: |
                  curl -fsSL -o mcp-publisher.tar.gz \
                    "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
                  echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
                  tar xzf mcp-publisher.tar.gz mcp-publisher
            - name: Authenticate to the MCP registry (GitHub OIDC)
              run: ./mcp-publisher login github-oidc
            - name: Publish to the MCP registry
              run: ./mcp-publisher publish
